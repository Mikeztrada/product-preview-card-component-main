<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Product preview card component</title>
    <link rel="stylesheet" href="style.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  </head>
  <body>
    <main>
      <picture class="imagen-producto">
        <source
          media="(max-width: 375px)"
          srcset="./images/image-product-mobile.jpg"
        />
        <img src="./images/image-product-desktop.jpg" alt="foto-de-producto" />
      </picture>

      <section class="descripcion-producto">
        <span>Perfume</span>
        <h1>Gabrielle Essence Eau De Parfum</h1>
        <p>
          A floral, solar and voluptuous interpretation composed by Olivier
          Polge, Perfumer-Creator for the House of CHANEL.
        </p>
        <div class="caja-precio">
          <span class="precio-producto">$149.99</span> <del>$169.99</del>
        </div>
        <button>
          <img
            class="carrito-compras"
            src="/images/icon-cart.svg"
            alt="carrito-de-compras"
          />Add to Cart
        </button>
      </section>
    </main>
  </body>
</html>
